<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mes Favoris</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:      #0c0c0f;
            --surface: #16161a;
            --border:  rgba(255,255,255,0.07);
            --accent:  #e63946;
            --text:    #ececec;
            --muted:   rgba(255,255,255,0.35);
            --card-bg: #1a1a20;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 48px 24px 80px;
        }

        header {
            max-width: 900px;
            margin: 0 auto 48px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2.4rem;
            letter-spacing: 3px;
        }

        .logo span { color: var(--accent); }

        .back-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px 18px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.85rem;
            cursor: pointer;
            text-decoration: none;
            transition: border-color 0.2s, background 0.2s;
        }

        .back-btn:hover {
            border-color: var(--accent);
            background: rgba(230,57,70,0.08);
        }

        .page-title {
            max-width: 900px;
            margin: 0 auto 32px;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .page-title h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2rem;
            letter-spacing: 2px;
        }

        .count-badge {
            background: rgba(230,57,70,0.15);
            border: 1px solid rgba(230,57,70,0.3);
            color: var(--accent);
            font-size: 0.8rem;
            padding: 4px 12px;
            border-radius: 20px;
        }

        .line {
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        /* Grille */
        #favoritesList {
            max-width: 900px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 20px;
        }

        /* Carte film */
        .movie-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 14px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: transform 0.2s, border-color 0.2s;
        }

        .movie-card:hover {
            transform: translateY(-4px);
            border-color: rgba(230,57,70,0.35);
        }

        .movie-card img {
            width: 100%;
            aspect-ratio: 2/3;
            object-fit: cover;
            display: block;
            background: #111;
        }

        .movie-info {
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            flex: 1;
        }

        .movie-info h3 {
            font-size: 0.88rem;
            font-weight: 500;
            line-height: 1.3;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .movie-info p {
            font-size: 0.75rem;
            color: var(--muted);
            margin-bottom: 8px;
        }

        .remove-btn {
            margin-top: auto;
            width: 100%;
            padding: 8px;
            border-radius: 8px;
            border: 1px solid rgba(230,57,70,0.3);
            background: rgba(230,57,70,0.08);
            color: var(--accent);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .remove-btn:hover {
            background: rgba(230,57,70,0.2);
        }

        /* Etat vide */
        .empty-state {
            max-width: 900px;
            margin: 80px auto;
            text-align: center;
            display: none;
        }

        .empty-state .icon {
            font-size: 4rem;
            margin-bottom: 16px;
            opacity: 0.3;
        }

        .empty-state h2 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.6rem;
            letter-spacing: 2px;
            color: var(--muted);
            margin-bottom: 12px;
        }

        .empty-state p {
            color: var(--muted);
            font-size: 0.9rem;
            margin-bottom: 24px;
        }

        .empty-state a {
            display: inline-block;
            background: var(--accent);
            color: #fff;
            text-decoration: none;
            padding: 12px 28px;
            border-radius: 10px;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.1rem;
            letter-spacing: 1px;
            transition: opacity 0.2s;
        }

        .empty-state a:hover { opacity: 0.85; }
    </style>
</head>
<body>

    <header>
        <div class="logo">Cine<span>Search</span></div>
        <a href="movie.html" class="back-btn">← Retour</a>
    </header>

    <div class="page-title">
        <h1>Mes Favoris</h1>
        <span class="count-badge" id="countBadge">0 film</span>
        <div class="line"></div>
    </div>

    <div id="favoritesList"></div>

    <div class="empty-state" id="emptyState">
        <div class="icon">★</div>
        <h2>Aucun favori</h2>
        <p>Tu n'as pas encore ajouté de film à tes favoris.</p>
        <a href="movie.html">Rechercher des films</a>
    </div>

    <script>
        const STORAGE_KEY = 'movie_favorites';

        function loadFavorites() {
            return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
        }

        function saveFavorites(favorites) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(favorites));
        }

        function removeFavorite(movieId) {
            const favorites = loadFavorites().filter(f => f.id !== movieId);
            saveFavorites(favorites);
            render();
        }

        function render() {
            const favorites   = loadFavorites();
            const list        = document.getElementById('favoritesList');
            const emptyState  = document.getElementById('emptyState');
            const countBadge  = document.getElementById('countBadge');

            const count = favorites.length;
            countBadge.textContent = count + ' film' + (count > 1 ? 's' : '');
            list.innerHTML = '';

            if (count === 0) {
                emptyState.style.display = 'block';
                return;
            }

            emptyState.style.display = 'none';

            favorites.forEach(movie => {
                const hasPoster = movie.poster && movie.poster !== 'N/A';
                const card      = document.createElement('div');
                card.classList.add('movie-card');

                card.innerHTML = `
                    <img src="${hasPoster ? movie.poster : 'https://via.placeholder.com/160x240?text=No+Image'}" alt="${movie.title}" />
                    <div class="movie-info">
                        <h3>${movie.title}</h3>
                        <p>${movie.year}</p>
                        <button class="remove-btn" data-id="${movie.id}">★ Retirer</button>
                    </div>
                `;

                card.querySelector('.remove-btn').addEventListener('click', () => removeFavorite(movie.id));
                list.appendChild(card);
            });
        }

        render();
    </script>

</body>
</html>

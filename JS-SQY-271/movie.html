<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineSearch</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
    <script src="movie.js" defer></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:       #0c0c0f;
            --surface:  #16161a;
            --border:   rgba(255,255,255,0.07);
            --accent:   #e63946;
            --text:     #ececec;
            --muted:    rgba(255,255,255,0.35);
            --card-bg:  #1a1a20;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 48px 24px 80px;
        }

        /* ── Header ── */
        header {
            max-width: 900px;
            margin: 0 auto 48px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2.4rem;
            letter-spacing: 3px;
            color: var(--text);
        }

        .logo span { color: var(--accent); }

        /* ── Bouton favoris header ── */
        #favBtn {
            display: flex;
            align-items: center;
            gap: 8px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px 18px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
        }

        #favBtn:hover {
            border-color: var(--accent);
            background: rgba(230,57,70,0.08);
        }

        #favBtn .star { color: var(--accent); font-size: 1rem; }

        /* ── Search bar ── */
        .search-wrapper {
            max-width: 900px;
            margin: 0 auto 40px;
            display: flex;
            gap: 12px;
        }

        #movieInput {
            flex: 1;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 15px 20px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.25s;
        }

        #movieInput::placeholder { color: var(--muted); }
        #movieInput:focus { border-color: var(--accent); }

        #movieSearchBtn {
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 12px;
            padding: 15px 28px;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.1rem;
            letter-spacing: 1px;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
            white-space: nowrap;
        }

        #movieSearchBtn:hover  { opacity: 0.85; }
        #movieSearchBtn:active { transform: scale(0.97); }

        /* ── Loader / Error ── */
        #movieLoader {
            display: none;
            text-align: center;
            color: var(--muted);
            font-size: 0.85rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            max-width: 900px;
            margin: 0 auto 24px;
            animation: pulse 1.2s infinite;
        }

        @keyframes pulse { 0%,100%{opacity:0.3} 50%{opacity:1} }

        #movieError {
            display: none;
            max-width: 900px;
            margin: 0 auto 24px;
            background: rgba(230,57,70,0.1);
            border: 1px solid rgba(230,57,70,0.25);
            border-radius: 10px;
            padding: 14px 20px;
            color: #e63946;
            font-size: 0.9rem;
        }

        /* ── Grille résultats ── */
        #movieResults {
            max-width: 900px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 20px;
        }

        /* ── Carte film ── */
        .movie-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 14px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: transform 0.2s, border-color 0.2s;
        }

        .movie-card:hover {
            transform: translateY(-4px);
            border-color: rgba(230,57,70,0.35);
        }

        .movie-card img {
            width: 100%;
            aspect-ratio: 2/3;
            object-fit: cover;
            display: block;
            background: #111;
        }

        .movie-info {
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            flex: 1;
        }

        .movie-info h3 {
            font-size: 0.88rem;
            font-weight: 500;
            line-height: 1.3;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .movie-info p {
            font-size: 0.75rem;
            color: var(--muted);
            margin-bottom: 8px;
        }

        /* ── Bouton favori sur carte ── */
        .fav-btn {
            margin-top: auto;
            width: 100%;
            padding: 8px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--muted);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .fav-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .fav-btn.is-fav {
            background: rgba(230,57,70,0.12);
            border-color: var(--accent);
            color: var(--accent);
        }

        /* ── Panneau favoris ── */
        #favoritesPanel {
            display: none;
            max-width: 900px;
            margin: 40px auto 0;
        }

        .fav-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 24px;
        }

        .fav-header h2 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.6rem;
            letter-spacing: 2px;
        }

        .fav-header .line {
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        #favoritesList {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 20px;
        }

        .empty-msg {
            color: var(--muted);
            font-size: 0.9rem;
            grid-column: 1/-1;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">Cine<span>Search</span></div>
       <a href="favorites.html" class="back-btn">★ Mes favoris</a>
    </header>

    <div class="search-wrapper">
        <input id="movieInput" type="text" placeholder="Rechercher un film..." />
        <button id="movieSearchBtn">Rechercher</button>
    </div>

    <div id="movieLoader">Chargement...</div>
    <div id="movieError"></div>

    <div id="movieResults"></div>

    <div id="favoritesPanel">
        <div class="fav-header">
            <h2>Mes Favoris</h2>
            <div class="line"></div>
        </div>
        <div id="favoritesList"></div>
    </div>

</body>
</html>
